services:
  - type: web
    name: sentinelcv-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: VISION_PROVIDER
        value: mock
      - key: POLL_INTERVAL_SECONDS
        value: "15"
      - key: PYTHON_VERSION
        value: "3.12.8"
